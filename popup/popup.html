<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Extension Settings</title>
    <link rel="stylesheet" href="popup.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app" class="dark-theme">
        <div id="view-settings" class="view active">
            <header class="main-header">
                <h1>Prompt for Prompt</h1>
                <div class="keybind-badge" id="keybind-display" title="Click to change keybind" tabindex="0">
                    <span class="key-tag">Alt</span> + <span class="key-tag">Enter</span>
                </div>
            </header>
            <main class="presets-section">
                <h2>Your Presets</h2>
                <div id="preset-list" class="preset-list">
                    <div class="empty-state">No presets found.</div>
                </div>
            </main>
            <footer>
                <button id="btn-add-preset" class="btn-primary">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    Add Preset
                </button>
            </footer>
        </div>

        <div id="view-add-preset" class="view">
            <header class="header-with-back">
                <button id="btn-back" class="icon-btn" aria-label="Go Back">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                </button>
                <h1 id="form-title">Add Preset</h1>
            </header>
            <main>
                <div class="form-group">
                    <label for="preset-name">Preset Name</label>
                    <input type="text" id="preset-name" placeholder="e.g. My Custom AI">
                </div>
                
                <div class="form-group">
                    <label for="provider-preset">Provider Preset</label>
                    <select id="provider-preset">
                    </select>
                </div>

                <div class="form-group" id="custom-endpoint-group" style="display: none;">
                    <label for="api-endpoint">API Endpoint</label>
                    <input type="url" id="api-endpoint" placeholder="https://api.openai.com/v1/chat/completions">
                </div>

                <div class="form-group">
                    <label for="model-name">Model</label>
                    <input type="text" id="model-name" placeholder="e.g. gpt-4">
                </div>

                <div class="form-group">
                    <label for="api-key">API Key</label>
                    <input type="password" id="api-key" placeholder="Enter your API key (optional)">
                </div>

                <div class="form-group" id="api-format-group" style="display: none;">
                    <label for="api-format">API Format</label>
                    <select id="api-format">
                        <option value="openai">OpenAI</option>
                        <option value="anthropic">Anthropic</option>
                    </select>
                </div>
            </main>
            <footer>
                <button id="btn-save" class="btn-primary success-btn">Save Preset</button>
                <button id="btn-delete" class="btn-primary danger-btn" style="display: none;">Delete Preset</button>
            </footer>
        </div>
    </div>
    <template id="preset-item-template">
        <div class="preset-item">
            <div class="preset-name">
                <span class="name-text"></span>
                <span class="active-badge">Active</span>
            </div>
            <div class="preset-actions">
                <button class="btn-activate-action icon-btn" title="Activate">
                    <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"><polyline points="20 6 9 17 4 12"></polyline></svg>
                </button>
                <button class="btn-edit-action icon-btn" title="Edit">
                    <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                </button>
            </div>
        </div>
    </template>
    <script src="popup.js"></script>
</body>
</html>
