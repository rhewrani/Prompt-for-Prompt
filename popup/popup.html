<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Extension Settings</title>
    <link rel="stylesheet" href="popup.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app" class="dark-theme">
        <!-- View 1: Settings / Preset List -->
        <div id="view-settings" class="view active">
            <header>
                <h1>Settings</h1>
            </header>
            <main class="presets-section">
                <h2>Your Presets</h2>
                <div id="preset-list" class="preset-list">
                    <!-- Dynamically added presets will go here -->
                    <!-- Example item template:
                    <div class="preset-item">
                        <span>My GPT-4 Preset</span>
                    </div>
                    -->
                    <div class="empty-state">No presets found.</div>
                </div>
            </main>
            <footer>
                <button id="btn-add-preset" class="btn-primary">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    Add Preset
                </button>
            </footer>
        </div>

        <!-- View 2: Add Preset Form -->
        <div id="view-add-preset" class="view">
            <header class="header-with-back">
                <button id="btn-back" class="icon-btn" aria-label="Go Back">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                </button>
                <h1>Add Preset</h1>
            </header>
            <main>
                <div class="form-group">
                    <label for="preset-name">Preset Name</label>
                    <input type="text" id="preset-name" placeholder="e.g. My Custom AI">
                </div>
                
                <div class="form-group">
                    <label for="provider-preset">Provider Preset</label>
                    <select id="provider-preset">
                        <!-- User's script will inject options here -->
                        <option value="custom">OpenAI</option>
                    </select>
                </div>

                <div class="form-group" id="custom-endpoint-group">
                    <label for="api-endpoint">API Endpoint</label>
                    <input type="url" id="api-endpoint" placeholder="https://api.openai.com/v1/chat/completions">
                </div>

                <div class="form-group">
                    <label for="model-name">Model</label>
                    <input type="text" id="model-name" placeholder="e.g. gpt-4">
                </div>

                <div class="form-group">
                    <label for="api-key">API Key</label>
                    <input type="password" id="api-key" placeholder="Enter your API key">
                </div>
            </main>
            <footer>
                <button id="btn-save" class="btn-primary success-btn">Save Preset</button>
            </footer>
        </div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
